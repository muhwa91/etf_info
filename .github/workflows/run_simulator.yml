name: Run ETF Simulator Daily

on:
  schedule:
    # 매일 한국 시간 오전 8시 30분 (UTC 기준 전날 23시 30분)
    - cron: '30 23 * * *'
  workflow_dispatch: # GitHub 웹사이트에서 수동으로 실행 가능하게 함

jobs:
  run-simulator:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Simulator
      env:
        # GitHub Secrets에 등록한 텔레그램 토큰 및 한국투자증권 API 키 주입
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      run: |
        python tiger_etf_simulator.py --mode market

